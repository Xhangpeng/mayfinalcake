<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Premium artisan cakes and pastries - KOSELI Bakery" />
    <meta name="theme-color" content="#064e3b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="KOSELI" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23064e3b' width='100' height='100'/><text x='50' y='50' dominant-baseline='middle' text-anchor='middle' font-size='60' font-weight='bold' fill='white' font-family='serif'>K</text></svg>" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%23064e3b' width='180' height='180' rx='40'/><text x='90' y='90' dominant-baseline='middle' text-anchor='middle' font-size='100' font-weight='bold' fill='white' font-family='serif'>K</text></svg>" />
    <title>KOSELI - Artisan Bakery</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Register service worker for PWA functionality
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch((error) => {
            console.log('Service Worker registration failed:', error);
          });
        });
      }

      // PWA Install Prompt
      let deferredPrompt;
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        // Dispatch custom event so React can show install button
        window.dispatchEvent(new CustomEvent('pwaReadyToInstall', { detail: { prompt: deferredPrompt } }));
      });

      window.addEventListener('appinstalled', () => {
        console.log('KOSELI app installed successfully!');
        deferredPrompt = null;
        window.dispatchEvent(new CustomEvent('pwaInstalled'));
      });
    </script>
  </body>
</html>
